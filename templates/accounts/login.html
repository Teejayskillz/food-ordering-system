{% extends "base.html" %}
{% block title %}Login — Saveur{% endblock %}

{% block content %}

<style>
  /* ─── Login page styles ─── */
  .login-wrap {
    max-width: 420px;
    margin: 0 auto;
    padding: 1rem 0 2rem;
  }

  .login-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }

  .login-heading {
    font-family: var(--font-display);
    font-size: 2.6rem;
    font-weight: 300;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .login-sub {
    font-size: 0.85rem;
    color: var(--cream-40);
    font-weight: 300;
    margin-bottom: 2.25rem;
  }

  /* ─── Field ─── */
  .field-group {
    margin-bottom: 1.25rem;
  }

  .field-label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream-60);
    margin-bottom: 0.5rem;
  }

  .field-input {
    width: 100%;
    background: rgba(240, 236, 228, 0.05);
    border: 1px solid rgba(200, 170, 110, 0.18);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.9rem;
    font-family: var(--font-body);
    color: var(--cream);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
  }

  .field-input::placeholder {
    color: rgba(240, 236, 228, 0.2);
  }

  .field-input:focus {
    border-color: rgba(200, 170, 110, 0.5);
    background: rgba(200, 170, 110, 0.06);
  }

  /* Password wrapper with toggle */
  .field-input-wrap {
    position: relative;
  }

  .field-input-wrap .field-input {
    padding-right: 3rem;
  }

  .pw-toggle {
    position: absolute;
    right: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--cream-40);
    cursor: pointer;
    padding: 0;
    font-size: 1rem;
    transition: color 0.2s;
    line-height: 1;
  }

  .pw-toggle:hover { color: var(--cream-60); }

  /* ─── Error ─── */
  .login-error {
    background: rgba(50, 20, 20, 0.55);
    border: 1px solid rgba(180, 80, 80, 0.25);
    border-radius: 12px;
    padding: 0.75rem 1rem;
    font-size: 0.82rem;
    color: #e8a8a8;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  /* ─── Submit ─── */
  .btn-login {
    width: 100%;
    background: var(--gold);
    color: var(--obsidian);
    border: none;
    border-radius: 100px;
    padding: 0.8rem 1.5rem;
    font-size: 0.75rem;
    font-weight: 500;
    font-family: var(--font-body);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 0.5rem;
  }

  .btn-login:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  /* ─── Divider ─── */
  .login-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.75rem 0;
    color: var(--cream-40);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .login-divider::before,
  .login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ─── Footer copy ─── */
  .login-footer {
    text-align: center;
    font-size: 0.82rem;
    color: var(--cream-40);
    margin-top: 1.5rem;
  }

  .login-footer a {
    color: var(--gold);
    text-decoration: none;
    transition: color 0.2s;
  }

  .login-footer a:hover {
    color: var(--gold-light);
  }

  /* ─── Decorative corner accent ─── */
  .login-card-wrap {
    position: relative;
  }

  .login-card-wrap::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 2rem;
    width: 48px;
    height: 2px;
    background: var(--gold);
    border-radius: 0 0 2px 2px;
  }
</style>

<div class="login-wrap">

  <!-- Heading -->
  <p class="login-eyebrow">Welcome back</p>
  <h1 class="login-heading">Sign in to<br>your account</h1>
  <p class="login-sub">Your next meal is a few taps away.</p>

  <!-- Error -->
  {% if error %}
    <div class="login-error">
      <i class="bi bi-exclamation-circle-fill"></i>
      {{ error }}
    </div>
  {% endif %}

  <!-- Form -->
  <div class="login-card-wrap">
    <form method="post" novalidate>
      {% csrf_token %}

      <div class="field-group">
        <label class="field-label" for="id_username">Username</label>
        <input
          class="field-input"
          id="id_username"
          name="username"
          type="text"
          placeholder="Enter your username"
          autocomplete="username"
          required
        >
      </div>

      <div class="field-group">
        <label class="field-label" for="id_password">Password</label>
        <div class="field-input-wrap">
          <input
            class="field-input"
            id="id_password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" type="submit">Continue</button>

    </form>
  </div>

  <div class="login-divider">or</div>

  <p class="login-footer">
    Don't have an account?
    <a href="{% url 'accounts:register' %}">Create one &rarr;</a>
  </p>

</div>

<script>
  (function () {
    var toggle = document.getElementById('pwToggle');
    var input  = document.getElementById('id_password');
    var icon   = document.getElementById('pwIcon');
    if (!toggle) return;
    toggle.addEventListener('click', function () {
      var show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
  })();
</script>

{% endblock %}
